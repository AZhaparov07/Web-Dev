<section class="wrap">
  <div class="top">
    <h2>Album #{{ albumId }} — Photos</h2>
    <button class="btn" (click)="back()">Back</button>
  </div>

  <div *ngIf="loading" class="state">Loading photos…</div>
  <div *ngIf="!loading && error" class="state error">{{ error }}</div>
  <div *ngIf="!loading && !error && photos.length === 0" class="state">No photos.</div>

  <div class="grid" *ngIf="!loading && !error && photos.length > 0">
    <div class="ph" *ngFor="let p of photos">
      <img [src]="p.thumbnailUrl" [alt]="p.title" />
      <div class="cap" title="{{ p.title }}">{{ p.title }}</div>
    </div>
  </div>
</section>
