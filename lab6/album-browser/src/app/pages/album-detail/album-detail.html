<div class="center">
  <div *ngIf="loading" class="card">Loading album...</div>

  <div *ngIf="!loading && error" class="card error">{{ error }}</div>

  <div *ngIf="!loading && !error && album" class="card">
    <h2>Album #{{ album.id }}</h2>
    <div class="sub">User ID: {{ album.userId }}</div>

    <input class="inp" [(ngModel)]="titleValue" placeholder="Album title" />

    <div class="actions">
      <button type="button" class="btn primary" (click)="save()">Save</button>
      <button type="button" class="btn" (click)="viewPhotos()">View Photos</button>
      <button type="button" class="btn" (click)="back()">Back</button>
    </div>
  </div>
</div>
